name: Build PR preview

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

# No secrets needed - this runs in the PR's context safely
permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  build-preview:
    runs-on: ubuntu-latest
    steps:
      - name: Use Node.js 24.x
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: '24.x'
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0  # Full history needed for git log last modified dates
      - name: Build website
        run: |
          npm install
          PATH_PREFIX="theia-website-previews/pr-previews/pr-${{ github.event.number }}" npm run build -- --prefix-paths
      - name: Save PR metadata
        run: |
          mkdir -p ./pr-metadata
          echo "${{ github.event.number }}" > ./pr-metadata/pr-number
      - name: Upload artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: "site"
          path: ./public
      - name: Upload PR metadata
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: "pr-metadata"
          path: ./pr-metadata
